# Synology nginx reverse proxy — subfolder /statmanager → Node.js port 3000
#
# On Synology DSM 7, place this file at:
#   /etc/nginx/conf.d/www.statmanager.conf
#
# The www.*.conf pattern is included inside the Web Station server blocks.
# Do NOT use http.*.conf — that lands at the http context level, not inside a server block.
#
# Deploy:
#   sudo cp nginx-statmanager.conf /etc/nginx/conf.d/www.statmanager.conf
#   sudo nginx -s reload
#
# NOTE: /etc/nginx/conf.d/ files survive DSM updates; /etc/nginx/nginx.conf does not.

location ^~ /statmanager/ {
    proxy_pass         http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}
