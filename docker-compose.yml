services:
  app:
    image: ghcr.io/hardfouls/statmanager:latest
    pull_policy: always
    container_name: statmanager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL:      "false"
    volumes:
      - statmanager_archives:/app/xml-archives
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: statmanager-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${DB_NAME}
      MARIADB_USER:          ${DB_USER}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - statmanager_db:/var/lib/mysql

volumes:
  statmanager_db:
  statmanager_archives:
