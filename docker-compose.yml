services:
  app:
    image: statmanager:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statmanager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DB_HOST:     ${DB_HOST}
      DB_PORT:     ${DB_PORT:-3306}
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Set DB_SSL=true when connecting to a remote host (e.g. DreamHost)
      DB_SSL:      ${DB_SSL:-false}
